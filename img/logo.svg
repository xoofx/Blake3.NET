<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320" role="img" aria-labelledby="title description">
  <title id="title">Blake3.NET</title>
  <desc id="description">The Blake3.NET wordmark over a modern red circular blade.</desc>

  <defs>
    <linearGradient id="bladeRed" x1="62" y1="46" x2="260" y2="274" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff405d"/>
      <stop offset="0.48" stop-color="#dc0a32"/>
      <stop offset="1" stop-color="#920019"/>
    </linearGradient>
    <radialGradient id="bladeDepth" cx="0" cy="0" r="1" gradientTransform="translate(128 108) rotate(48) scale(190)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff7689" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#c9002a" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#57000f" stop-opacity="0.34"/>
    </radialGradient>
    <linearGradient id="steel" x1="0" y1="138" x2="0" y2="181" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="0.52" stop-color="#d8dde5"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <path id="tooth" d="M139 50c7-17 20-30 38-38-3 16 2 31 14 43Z"/>
    <mask id="bladeCutouts" x="0" y="0" width="320" height="320" maskUnits="userSpaceOnUse">
      <rect width="320" height="320" fill="#ffffff"/>
      <path d="M149 137c25-43 61-74 111-91-29 31-45 68-46 109-22-7-44-13-65-18Z" fill="#000000"/>
      <path d="M149 137c25-43 61-74 111-91-29 31-45 68-46 109-22-7-44-13-65-18Z" fill="#000000" transform="rotate(120 160 160)"/>
      <path d="M149 137c25-43 61-74 111-91-29 31-45 68-46 109-22-7-44-13-65-18Z" fill="#000000" transform="rotate(240 160 160)"/>
      <circle cx="160" cy="160" r="18" fill="#000000"/>
    </mask>
  </defs>

  <!-- The swept, toothed circle keeps the original BLADE-inspired reference. -->
  <g mask="url(#bladeCutouts)">
    <g fill="url(#bladeRed)">
      <circle cx="160" cy="160" r="116"/>
      <use href="#tooth"/>
      <use href="#tooth" transform="rotate(30 160 160)"/>
      <use href="#tooth" transform="rotate(60 160 160)"/>
      <use href="#tooth" transform="rotate(90 160 160)"/>
      <use href="#tooth" transform="rotate(120 160 160)"/>
      <use href="#tooth" transform="rotate(150 160 160)"/>
      <use href="#tooth" transform="rotate(180 160 160)"/>
      <use href="#tooth" transform="rotate(210 160 160)"/>
      <use href="#tooth" transform="rotate(240 160 160)"/>
      <use href="#tooth" transform="rotate(270 160 160)"/>
      <use href="#tooth" transform="rotate(300 160 160)"/>
      <use href="#tooth" transform="rotate(330 160 160)"/>
    </g>
    <circle cx="160" cy="160" r="116" fill="url(#bladeDepth)"/>
  </g>

  <!-- Restrained edge lighting gives the blade depth without tying it to a page theme. -->
  <path d="M75 96A108 108 0 0 1 207 63" fill="none" stroke="#ff8798" stroke-width="5" stroke-linecap="round" opacity="0.58"/>
  <path d="M245 224a108 108 0 0 1-132 33" fill="none" stroke="#690012" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <circle cx="160" cy="160" r="31" fill="none" stroke="#ff526b" stroke-width="5" opacity="0.72"/>

  <!-- The wordmark is the only text retained in the icon. -->
  <text x="160" y="173" fill="url(#steel)" stroke="#57000f" stroke-width="7" paint-order="stroke fill" stroke-linejoin="round" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="900" letter-spacing="0.3">BLAKE3.NET</text>
</svg>
